apiVersion: v1
kind: Namespace
metadata:
  name: kakao-webhook

---
apiVersion: v1
kind: Secret
metadata:
  name: kakao-webhook-secret
  namespace: kakao-webhook
type: Opaque
stringData:
  DB_PASSWORD: "여기에_MySQL_비밀번호"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kakao-webhook
  namespace: kakao-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kakao-webhook
  template:
    metadata:
      labels:
        app: kakao-webhook
    spec:
      containers:
        - name: kakao-webhook
          image: ghcr.io/parkhyunchang/kakao_webhook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3500
          env:
            - name: DB_HOST
              value: "host.docker.internal"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "hyunchang88"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kakao-webhook-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              value: "kakao_db"
            - name: VLLM_BASE_URL
              value: "http://qwen2-5-vl-32b-awq.vllm.svc.cluster.local:8000"
            - name: VLLM_MODEL
              value: "qwen2.5-vl-32b-instruct-awq"
            - name: VLLM_TIMEOUT
              value: "55"
            - name: LOG_DIR
              value: "/app/logs"
            - name: TZ
              value: "Asia/Seoul"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: kakao-webhook
  namespace: kakao-webhook
spec:
  type: NodePort
  selector:
    app: kakao-webhook
  ports:
    - port: 3500
      targetPort: 3500
      nodePort: 30350
