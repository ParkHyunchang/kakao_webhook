services:
  kakao-webhook:
    image: ghcr.io/parkhyunchang/kakao_webhook:latest
    container_name: kakao_webhook
    restart: always
    ports:
      - "3500:3500"
    environment:
      VLLM_BASE_URL: ${VLLM_BASE_URL}
      VLLM_MODEL: ${VLLM_MODEL:-qwen2.5-vl-32b-instruct-awq}
      VLLM_TIMEOUT: ${VLLM_TIMEOUT:-55}
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
    volumes:
      - ./logs:/app/logs
